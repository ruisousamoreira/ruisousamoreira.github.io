<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiago Moreira | Portfolio</title>
    <style>
        /* Global & Colors */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #dddddf;
            color: #002fa7;
            font-family: 'Helvetica', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Sticky Header/Footer */
        header, footer {
            position: sticky;
            background-color: #dddddf;
            z-index: 1000;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header { top: 0; }
        footer { bottom: 0; margin-top: auto; font-size: 0.9rem; }

        .profile-icon { height: 40px; width: auto; }

        nav ul { list-style: none; display: flex; gap: 30px; }
        .nav-link { 
            text-decoration: none; 
            color: #002fa7; 
            font-size: 0.9rem; 
            letter-spacing: 1px; 
            cursor: pointer;
        }
        .active { font-weight: bold; }

        /* Main Layout */
        main {
            display: grid;
            grid-template-columns: 20% 80%;
            padding: 0 50px;
            flex-grow: 1;
        }

        /* Grid System */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding-bottom: 50px;
        }

        /* Grid Item Styling */
        .grid-item {
            border: 1px solid #002fa7; 
            border-radius: 25px;       
            overflow: hidden; /* Ensures images/content follow the rounded corners */
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }

        /* Image handling within grid cells */
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This makes the image fill the area nicely */
            display: block;
        }

        /* Reveal Animation Styles */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Specific Layout Logic */
        .hero-item {
            grid-column: 1 / -1;       
            height: 80vh;              
            margin-bottom: 15px;
        }

        /* Color boxes from image for debugging/structure */
        .box-ebony { grid-column: span 2; background-color: #101720; color: white; padding: 20px; }
        .box-magnolia { grid-column: span 1; background-color: #f4f4fb; padding: 20px; }
        .box-light-peri { grid-column: span 1; background-color: #bdc5ff; padding: 20px; }
        .box-cornflower { grid-column: span 1; grid-row: span 2; background-color: #6c7aff; min-height: 415px; padding: 20px; }
        .box-sandy { grid-column: span 1; background-color: #f4a261; padding: 20px; }
        .box-peri-blue { grid-column: span 1; background-color: #8794f9; padding: 20px; }
        .box-navajo { grid-column: span 1; background-color: #ffe0ab; padding: 20px; }

        /* Mobile Adjustments */
        .mobile-nav-body { display: none; }

        @media (max-width: 768px) {
            header, footer, main { padding: 15px; }
            .desktop-only { display: none; }
            main { display: block; }
            .column-left { display: none; }
            
            .mobile-nav-body { 
                display: flex; 
                flex-direction: column; 
                gap: 10px; 
                margin-bottom: 30px;
            }
            .mobile-nav-body .nav-link { font-size: 2rem; }

            .content-grid { grid-template-columns: 1fr; }
            .grid-item { grid-column: span 1 !important; grid-row: span 1 !important; height: auto; min-height: 250px;}
            .hero-item { height: 50vh; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#"><img src="assets/profile.png" alt="Profile" class="profile-icon"></a>
        <nav>
            <ul>
                <li class="desktop-only"><a href="#" class="nav-link active">WORK</a></li>
                <li class="desktop-only"><a href="#" class="nav-link">PROCESS</a></li>
                <li class="desktop-only"><a href="#" class="nav-link">ABOUT</a></li>
                <li><a href="#" class="nav-link">EN/PT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="column-left"></div>

        <div class="column-right">
            <div class="mobile-nav-body">
                <a href="#" class="nav-link active">WORK</a>
                <a href="#" class="nav-link">PROCESS</a>
                <a href="#" class="nav-link">ABOUT</a>
            </div>

            <div class="content-grid">
                
                <!-- Updated Hero Item with your image -->
                <div class="grid-item hero-item reveal">
                    <img src="assets/work/suplementar/suplementar-1.jpg" alt="Suplementar Design Project">
                </div>

                <!-- Color Grid Elements -->
                <div class="grid-item box-ebony reveal">Ebony Clay</div>
                <div class="grid-item box-magnolia reveal">Magnolia</div>
                
                <div class="grid-item box-light-peri reveal">Light Periwinkle</div>
                <div class="grid-item box-cornflower reveal">Cornflower Blue</div>
                <div class="grid-item box-sandy reveal">Sandy Brown</div>
                
                <div class="grid-item box-peri-blue reveal">Periwinkle Blue</div>
                <div class="grid-item box-navajo reveal">Navajo White</div>

            </div>
        </div>
    </main>

    <footer>
        <div><a href="mailto:ola@tiagoandre.pt" class="nav-link">ola@tiagoandre.pt</a></div>
        <div>2026, Tiago Moreira</div>
    </footer>

    <script>
        // Reveal Animation Logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Navigation Bold Logic
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                if (!this.href.includes('mailto')) {
                    e.preventDefault();
                    navLinks.forEach(item => item.classList.remove('active'));
                    const text = this.textContent;
                    navLinks.forEach(item => {
                        if(item.textContent === text) item.classList.add('active');
                    });
                }
            });
        });
    </script>
</body>
</html>
